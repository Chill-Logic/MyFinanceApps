name: Mobile CD (EAS)

# Dispara automaticamente só quando um PR que mexeu em apps/mobile é MESCLADO na main (nunca em
# push solto, porque o evento é pull_request, não push). Também aceita disparo manual
# (workflow_dispatch) pra testar o pipeline sem precisar de um PR real tocando em apps/mobile/**
# (o filtro de path abaixo só se aplica ao evento pull_request).
on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - "apps/mobile/**"
  workflow_dispatch: {}

jobs:
  decide:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      needs_native_build: ${{ steps.fingerprint.outputs.needs_native_build }}
    steps:
      - name: Checkout commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instala dependencias (raiz do monorepo)
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Compara fingerprint com o ultimo build de producao
        id: fingerprint
        working-directory: apps/mobile
        run: |
          BUILD_ID=$(npx eas-cli build:list --platform android --channel production --status finished --limit 1 --non-interactive --json | node -e "process.stdin.resume();process.stdin.setEncoding('utf8');let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const j=JSON.parse(d);console.log(j[0]?.id||'')})")

          if [ -z "$BUILD_ID" ]; then
            echo "Nenhum build anterior encontrado no canal production - build nativo necessario."
            echo "needs_native_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Comparando fingerprint atual com o build $BUILD_ID"
          COMPARE=$(npx eas-cli fingerprint:compare --build-id "$BUILD_ID" --json --non-interactive)
          SAME=$(echo "$COMPARE" | node -e "process.stdin.resume();process.stdin.setEncoding('utf8');let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const j=JSON.parse(d);console.log(j.fingerprint1.hash === j.fingerprint2.hash)})")

          if [ "$SAME" = "true" ]; then
            echo "Fingerprint identico - OTA e suficiente."
            echo "needs_native_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Fingerprint mudou - precisa de build nativo."
            echo "needs_native_build=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  publish:
    needs: decide
    runs-on: ubuntu-latest
    steps:
      - name: Checkout commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instala dependencias (raiz do monorepo)
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Restaura a chave da conta de servico do Google
        working-directory: apps/mobile
        run: echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_BASE64 }}" | base64 -d > google-service-account.json

      - name: Publica OTA (fingerprint identico ao ultimo build nativo)
        if: needs.decide.outputs.needs_native_build == 'false'
        working-directory: apps/mobile
        run: npx eas-cli update --channel production --environment production --non-interactive -m "${{ github.event.pull_request.title || 'Disparo manual (workflow_dispatch)' }}"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Builda e envia binario nativo (fingerprint mudou)
        if: needs.decide.outputs.needs_native_build == 'true'
        working-directory: apps/mobile
        run: npx eas-cli build --platform android --profile production --auto-submit --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Notifica sucesso no Discord
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DEPLOY_TIPO: ${{ needs.decide.outputs.needs_native_build == 'true' && 'build nativo + submit' || 'OTA' }}
          PR_TITLE: ${{ github.event.pull_request.title || 'Disparo manual (workflow_dispatch)' }}
          COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          node -e "
            const https = require('node:https');
            const payload = JSON.stringify({
              embeds: [{
                title: '✅ Deploy mobile publicado com sucesso',
                color: 5763719,
                url: process.env.RUN_URL,
                fields: [
                  { name: 'Projeto', value: process.env.REPO + ' (mobile)', inline: true },
                  { name: 'Ambiente', value: 'Production', inline: true },
                  { name: 'Tipo', value: process.env.DEPLOY_TIPO, inline: true },
                  { name: 'PR', value: process.env.PR_TITLE, inline: false },
                  { name: 'Commit', value: '\`' + process.env.COMMIT_SHA + '\`', inline: true },
                  { name: 'Disparado por', value: process.env.ACTOR, inline: true },
                ],
                footer: { text: 'GitHub Actions' },
                timestamp: new Date().toISOString(),
              }],
            });
            const req = https.request(process.env.DISCORD_WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' } }, (res) => {
              res.resume();
              if (res.statusCode >= 300) console.error('Discord respondeu ' + res.statusCode + ' — mensagem pode nao ter sido enviada.');
            });
            req.on('error', (e) => { console.error('Falha ao notificar o Discord: ' + e.message); });
            req.setTimeout(10000, () => { console.error('Timeout ao notificar o Discord.'); req.destroy(); });
            req.end(payload);
          "

      - name: Notifica falha no Discord
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title || 'Disparo manual (workflow_dispatch)' }}
          COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          node -e "
            const https = require('node:https');
            const payload = JSON.stringify({
              embeds: [{
                title: '❌ Deploy mobile falhou',
                color: 15158332,
                url: process.env.RUN_URL,
                fields: [
                  { name: 'Projeto', value: process.env.REPO + ' (mobile)', inline: true },
                  { name: 'Ambiente', value: 'Production', inline: true },
                  { name: 'PR', value: process.env.PR_TITLE, inline: false },
                  { name: 'Commit', value: '\`' + process.env.COMMIT_SHA + '\`', inline: true },
                  { name: 'Disparado por', value: process.env.ACTOR, inline: true },
                ],
                footer: { text: 'GitHub Actions' },
                timestamp: new Date().toISOString(),
              }],
            });
            const req = https.request(process.env.DISCORD_WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' } }, (res) => {
              res.resume();
              if (res.statusCode >= 300) console.error('Discord respondeu ' + res.statusCode + ' — mensagem pode nao ter sido enviada.');
            });
            req.on('error', (e) => { console.error('Falha ao notificar o Discord: ' + e.message); });
            req.setTimeout(10000, () => { console.error('Timeout ao notificar o Discord.'); req.destroy(); });
            req.end(payload);
          "
